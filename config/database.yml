default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch(
          "DATABASE_URL",
          "postgres://postgres:postgres@db:5432/butterfly_room_development"
        ) %>

test:
  <<: *default
  url: <%= ENV.fetch(
          "DATABASE_URL_TEST",
          "postgres://postgres:postgres@db:5432/butterfly_room_test"
        ) %>

production:
  primary:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL") %>

  cable:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL") %>

  queue:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL") %>

  cache:
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL") %>
