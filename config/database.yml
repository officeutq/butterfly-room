default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch(
          "DATABASE_URL",
          "postgres://postgres:postgres@db:5432/butterfly_room_development"
        ) %>

test:
  <<: *default
  url: <%= ENV.fetch(
          "DATABASE_URL_TEST",
          "postgres://postgres:postgres@db:5432/butterfly_room_test"
        ) %>

production:
  <<: *default
  url: <%= if (ENV["RAILS_ENV"] || ENV["RACK_ENV"]) == "production"
             ENV.fetch("DATABASE_URL")
           else
             ENV["DATABASE_URL"] || "postgres://postgres:postgres@db:5432/dummy"
           end %>