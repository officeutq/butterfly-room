services:
  app:
    build: .
    image: butterfly_room:prod
    container_name: butterfly_room-app
    working_dir: /app
    env_file:
      - ./.env.production
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      NODE_ENV: production
    command: bash -lc "bundle exec rails server -b 0.0.0.0 -p 3000"
    restart: unless-stopped
    